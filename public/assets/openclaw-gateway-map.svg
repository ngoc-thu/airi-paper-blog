<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw gateway map</title>
  <desc id="desc">A diagram showing OpenClaw as a self-hosted gateway between chat apps, AI agents, local tools, memory, files, and automations.</desc>
  <defs>
    <radialGradient id="bg" cx="22%" cy="16%" r="82%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.24"/>
      <stop offset="48%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#2563eb" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1440" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="1230" cy="150" r="210" fill="#a78bfa" opacity="0.13"/>
  <circle cx="160" cy="615" r="210" fill="#22d3ee" opacity="0.15"/>

  <g filter="url(#shadow)">
    <rect x="414" y="150" width="612" height="460" rx="36" fill="url(#panel)" stroke="#cbd5e1"/>
    <rect x="452" y="190" width="536" height="78" rx="22" fill="#0f172a"/>
    <circle cx="494" cy="229" r="11" fill="#38bdf8"/>
    <circle cx="530" cy="229" r="11" fill="#60a5fa"/>
    <circle cx="566" cy="229" r="11" fill="#34d399"/>
    <text x="612" y="236" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="850" fill="#f8fafc">OpenClaw</text>
    <text x="612" y="260" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#94a3b8">self-hosted agent gateway</text>

    <rect x="500" y="334" width="440" height="170" rx="30" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
    <text x="720" y="392" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="850" fill="#172033">Chat-native AI</text>
    <text x="720" y="432" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#475569">with tools, memory, sessions, and safety</text>
    <text x="720" y="470" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#64748b">Telegram • WhatsApp • Slack • Discord • files • shell • browser</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <g transform="translate(96 126)">
      <rect width="278" height="122" rx="26" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="30" y="50" font-size="25" font-weight="850" fill="#172033">Channels</text>
      <text x="30" y="84" font-size="16" fill="#64748b">Telegram, WhatsApp, Slack, Zalo</text>
    </g>
    <g transform="translate(106 520)">
      <rect width="282" height="122" rx="26" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="30" y="50" font-size="25" font-weight="850" fill="#172033">Workspace</text>
      <text x="30" y="84" font-size="16" fill="#64748b">AGENTS, memory, files, identity</text>
    </g>
    <g transform="translate(1060 126)">
      <rect width="278" height="122" rx="26" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="30" y="50" font-size="25" font-weight="850" fill="#172033">Agents</text>
      <text x="30" y="84" font-size="16" fill="#64748b">Codex, Pi, Claude, OpenAI</text>
    </g>
    <g transform="translate(1052 520)">
      <rect width="286" height="122" rx="26" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="30" y="50" font-size="25" font-weight="850" fill="#172033">Automations</text>
      <text x="30" y="84" font-size="16" fill="#64748b">heartbeats, cron, browser tasks</text>
    </g>
    <g transform="translate(590 638)">
      <rect width="260" height="86" rx="24" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="130" y="38" text-anchor="middle" font-size="22" font-weight="850" fill="#172033">Tools</text>
      <text x="130" y="64" text-anchor="middle" font-size="14" fill="#64748b">exec, files, media, search, skills</text>
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.78" fill="none">
    <path d="M374 188 C454 220 468 274 518 350"/>
    <path d="M388 578 C470 546 488 494 534 462"/>
    <path d="M1060 188 C998 224 982 276 936 350"/>
    <path d="M1052 578 C966 548 956 496 906 462"/>
    <path d="M720 638 V505"/>
  </g>
</svg>
