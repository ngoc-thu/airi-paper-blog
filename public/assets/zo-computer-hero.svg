<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Zo Computer product map</title>
  <desc id="desc">A visual map showing Zo Computer as a personal cloud computer connected to files, tools, integrations, automations, and hosting.</desc>
  <defs>
    <radialGradient id="bg" cx="24%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1440" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="1140" cy="120" r="210" fill="#22d3ee" opacity="0.08"/>
  <circle cx="1190" cy="580" r="270" fill="#a78bfa" opacity="0.10"/>
  <circle cx="220" cy="610" r="180" fill="#10b981" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="390" y="150" width="660" height="450" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="422" y="182" width="596" height="72" rx="20" fill="#020617" fill-opacity="0.52" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="462" cy="218" r="11" fill="#22d3ee"/>
    <circle cx="498" cy="218" r="11" fill="#a78bfa"/>
    <circle cx="534" cy="218" r="11" fill="#34d399"/>
    <text x="574" y="226" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23" font-weight="700" fill="#e5f7ff">Zo Computer</text>
    <text x="574" y="252" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#94a3b8">personal cloud computer</text>

    <rect x="476" y="310" width="488" height="168" rx="28" fill="#020617" fill-opacity="0.62" stroke="url(#accent)" stroke-width="2"/>
    <text x="720" y="365" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">Always-on AI</text>
    <text x="720" y="407" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#cbd5e1">that remembers, runs tools, and ships work</text>
    <text x="720" y="446" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#94a3b8">files + web + code + apps + hosting</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <g transform="translate(110 122)">
      <rect width="240" height="116" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="28" y="48" font-size="24" font-weight="800" fill="#f8fafc">Files</text>
      <text x="28" y="80" font-size="15" fill="#cbd5e1">notes, PDFs, code, media</text>
    </g>
    <g transform="translate(112 520)">
      <rect width="260" height="116" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="28" y="48" font-size="24" font-weight="800" fill="#f8fafc">Automations</text>
      <text x="28" y="80" font-size="15" fill="#cbd5e1">scheduled prompts with context</text>
    </g>
    <g transform="translate(1048 122)">
      <rect width="282" height="116" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="28" y="48" font-size="24" font-weight="800" fill="#f8fafc">Integrations</text>
      <text x="28" y="80" font-size="15" fill="#cbd5e1">Gmail, Drive, Slack, Notion</text>
    </g>
    <g transform="translate(1070 520)">
      <rect width="260" height="116" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="28" y="48" font-size="24" font-weight="800" fill="#f8fafc">Hosting</text>
      <text x="28" y="80" font-size="15" fill="#cbd5e1">Space, Sites, Services, zo.pub</text>
    </g>
    <g transform="translate(590 626)">
      <rect width="260" height="86" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="130" y="38" text-anchor="middle" font-size="22" font-weight="800" fill="#f8fafc">Tools</text>
      <text x="130" y="64" text-anchor="middle" font-size="14" fill="#cbd5e1">web, shell, files, publishing</text>
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.72" fill="none">
    <path d="M350 180 C430 210 430 260 476 330"/>
    <path d="M374 578 C460 548 466 496 514 458"/>
    <path d="M1048 180 C990 210 988 260 948 330"/>
    <path d="M1070 578 C984 546 974 496 924 458"/>
    <path d="M720 626 V480"/>
  </g>
</svg>
