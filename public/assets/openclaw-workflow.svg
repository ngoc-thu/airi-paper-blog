<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="520" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw workflow</title>
  <desc id="desc">A workflow diagram showing a message entering OpenClaw, mapping to a session, using workspace context and tools, then sending a reply back to the channel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1d4ed8" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1440" height="520" rx="34" fill="url(#bg)"/>
  <text x="720" y="76" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="850" fill="#172033">A message becomes an operational loop</text>
  <text x="720" y="112" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">OpenClaw keeps the chat interface simple while routing state, tools, and delivery behind it.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <g transform="translate(86 168)">
      <rect width="250" height="168" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="34" y="56" font-size="27" font-weight="850" fill="#172033">1. Message</text>
      <text x="34" y="96" font-size="17" fill="#475569">Arrives from a channel</text>
      <text x="34" y="126" font-size="15" fill="#64748b">Telegram, WhatsApp, Discord</text>
    </g>
    <g transform="translate(430 168)">
      <rect width="250" height="168" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="34" y="56" font-size="27" font-weight="850" fill="#172033">2. Session</text>
      <text x="34" y="96" font-size="17" fill="#475569">Routes to context</text>
      <text x="34" y="126" font-size="15" fill="#64748b">memory, transcripts, compaction</text>
    </g>
    <g transform="translate(774 168)">
      <rect width="250" height="168" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="34" y="56" font-size="27" font-weight="850" fill="#172033">3. Work</text>
      <text x="34" y="96" font-size="17" fill="#475569">Uses tools safely</text>
      <text x="34" y="126" font-size="15" fill="#64748b">files, shell, web, media, skills</text>
    </g>
    <g transform="translate(1118 168)">
      <rect width="250" height="168" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
      <text x="34" y="56" font-size="27" font-weight="850" fill="#172033">4. Reply</text>
      <text x="34" y="96" font-size="17" fill="#475569">Sends back to chat</text>
      <text x="34" y="126" font-size="15" fill="#64748b">text, files, media, updates</text>
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.86">
    <path d="M350 252 H408"/>
    <path d="M694 252 H752"/>
    <path d="M1038 252 H1096"/>
  </g>
  <g fill="#2563eb" opacity="0.9">
    <path d="M410 252 l-18 -11 v22 z"/>
    <path d="M754 252 l-18 -11 v22 z"/>
    <path d="M1098 252 l-18 -11 v22 z"/>
  </g>
</svg>
