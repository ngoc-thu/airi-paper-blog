<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="520" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">Zo Computer workflow</title>
  <desc id="desc">A visual workflow showing a user prompt becoming context, tools, automations, and published outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="52%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1440" height="520" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" filter="url(#shadow)">
    <g transform="translate(86 154)">
      <rect width="250" height="180" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="34" y="58" font-size="27" font-weight="800" fill="#f8fafc">1. Ask</text>
      <text x="34" y="98" font-size="17" fill="#cbd5e1">Text Zo like a teammate</text>
      <text x="34" y="128" font-size="15" fill="#94a3b8">chat, SMS, Telegram, Slack, email</text>
    </g>
    <g transform="translate(430 154)">
      <rect width="250" height="180" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="34" y="58" font-size="27" font-weight="800" fill="#f8fafc">2. Context</text>
      <text x="34" y="98" font-size="17" fill="#cbd5e1">Files and memory matter</text>
      <text x="34" y="128" font-size="15" fill="#94a3b8">workspace, notes, docs, webpages</text>
    </g>
    <g transform="translate(774 154)">
      <rect width="250" height="180" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="34" y="58" font-size="27" font-weight="800" fill="#f8fafc">3. Act</text>
      <text x="34" y="98" font-size="17" fill="#cbd5e1">Run tools and integrations</text>
      <text x="34" y="128" font-size="15" fill="#94a3b8">web, code, apps, automations</text>
    </g>
    <g transform="translate(1118 154)">
      <rect width="250" height="180" rx="28" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="34" y="58" font-size="27" font-weight="800" fill="#f8fafc">4. Ship</text>
      <text x="34" y="98" font-size="17" fill="#cbd5e1">Create durable outputs</text>
      <text x="34" y="128" font-size="15" fill="#94a3b8">files, sites, services, reports</text>
    </g>
  </g>
  <g stroke="url(#accent)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.86">
    <path d="M350 244 H408"/>
    <path d="M694 244 H752"/>
    <path d="M1038 244 H1096"/>
  </g>
  <g fill="#22d3ee" opacity="0.9">
    <path d="M410 244 l-18 -11 v22 z"/>
    <path d="M754 244 l-18 -11 v22 z"/>
    <path d="M1098 244 l-18 -11 v22 z"/>
  </g>
  <text x="720" y="74" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="850" fill="#f8fafc">From conversation to infrastructure</text>
  <text x="720" y="112" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#94a3b8">The useful part is not only the model. It is the environment around the model.</text>
</svg>
